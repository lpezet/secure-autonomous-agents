# nginx config for the credential gateway.
# This is the ONLY way the dev container can reach broker functionality.
# It whitelists exactly the endpoints dev legitimately needs.

# nginx:alpine defaults already symlink access_log to /dev/stdout and
# error_log to /dev/stderr, so `docker compose logs cred-gateway` shows
# all requests without additional configuration.

limit_req_zone $binary_remote_addr zone=creds:1m rate=10r/m;

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Health
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Whitelisted endpoints. This base image ships NO provider endpoints —
  # bind-mount a host directory of `location = /exact/path` snippets at
  # /etc/nginx/gateway.d (read-only). Same convention as the broker's
  # /app/providers and the proxy's /addons: base = mechanism, deployment =
  # content. See gateway.d/README.md for the GitHub reference snippet.
  #
  # The mount source must be a host path the dev container cannot see — do
  # not point it inside the directory mounted at /workspace, or the agent
  # could widen its own whitelist.
  #
  # An empty glob is not an error in nginx, so the image builds and starts
  # unmounted — it will just deny everything but /healthz.
  include /etc/nginx/gateway.d/*.conf;

  # Default: deny. /anthropic/key, /github/token, /cloudflare/token are
  # NOT exposed here — they would let dev exfiltrate credentials directly.
  # Exact-match locations above win over this prefix match regardless of
  # ordering, so included snippets are reachable.
  location / {
    return 403 "endpoint not exposed to dev container\n";
    add_header Content-Type text/plain;
  }
}
