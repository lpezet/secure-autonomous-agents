# A second provider snippet, to prove multiple files are included and that a
# new provider needs no image change.
location = /extra/credential {
  limit_req zone=creds burst=5 nodelay;
  proxy_pass http://broker:8080/extra/credential;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_read_timeout 10s;
}
