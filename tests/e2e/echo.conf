# Reflects the credential-bearing request headers back to the caller so a test
# can assert on what the proxy actually sent. Answers to `attacker-host`.
server {
  listen 80 default_server;
  location / {
    default_type text/plain;
    return 200 "RECEIVED-BY=$host AUTH=$http_authorization XAPIKEY=$http_x_api_key\n";
  }
}
