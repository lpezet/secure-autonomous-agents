# GitHub endpoints exposed to the dev container.
# Counterpart to addons/010_github.py and providers/github.js.
#
# These two exist because git needs the credential locally — the credential
# helper is a local process protocol, and git identity is a local config
# write. Everything else GitHub-related goes through token injection in
# 010_github.py, so dev never sees it. /github/token is deliberately absent.

# Git credential helper — short-lived installation token in
# `git credential` format. Scoped to the App's installations.
location = /github/credential {
  limit_req zone=creds burst=5 nodelay;
  proxy_pass http://broker:8080/github/credential;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_read_timeout 10s;
}

# GitHub App identity (name + email) for `git config user.*`.
location = /github/identity {
  limit_req zone=creds burst=5 nodelay;
  proxy_pass http://broker:8080/github/identity;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_read_timeout 10s;
}
