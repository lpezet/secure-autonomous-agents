name: claude-code-agent

services:
  broker:
    build: https://github.com/lpezet/secure-autonomous-agents.git#main:stack/broker
    volumes:
      - ${HOME}/.config/agent-creds:/secrets:ro
      - ./providers:/app/providers:ro
    env_file: .env
    environment:
      GITHUB_APP_PRIVATE_KEY_PATH: /secrets/github-app.pem
    networks: [secure]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  proxy:
    build: https://github.com/lpezet/secure-autonomous-agents.git#main:stack/proxy
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./addons:/addons:ro
      - proxy-certs:/home/mitmproxy/.mitmproxy
    environment:
      BROKER_URL: http://broker:8080
    networks: [secure, dev]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /home/mitmproxy/.mitmproxy/mitmproxy-ca-cert.pem",
        ]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  cred-gateway:
    build: https://github.com/lpezet/secure-autonomous-agents.git#main:stack/cred-gateway
    depends_on:
      broker:
        condition: service_healthy
    networks: [secure, dev]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  dev:
    build:
      context: ./dev
      args:
        CLAUDE_VERSION: ${CLAUDE_VERSION:-latest}
    depends_on:
      proxy:
        condition: service_healthy
      cred-gateway:
        condition: service_healthy
    volumes:
      - proxy-certs:/proxy-certs:ro
      - ./workspace/.claude:/root/.claude
      - ./workspace/.claude.json:/root/.claude.json
      - ./workspace/.config:/root/.config
      - ./workspace/CLAUDE.md:/root/CLAUDE.md:ro
      # Mount the repo or project Claude Code will work on:
      # - /path/to/your/project:/workspace
    environment:
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1,cred-gateway
      NODE_EXTRA_CA_CERTS: /proxy-certs/mitmproxy-ca-cert.pem
      REQUESTS_CA_BUNDLE: /proxy-certs/mitmproxy-ca-cert.pem
      SSL_CERT_FILE: /proxy-certs/mitmproxy-ca-cert.pem
      GIT_CREDENTIAL_URL: http://cred-gateway/github/credential
      GITHUB_IDENTITY_URL: http://cred-gateway/github/identity
      # Dummy values — proxy strips these and injects real credentials
      ANTHROPIC_API_KEY: proxy-injected
      GH_TOKEN: proxy-injected
    networks: [dev]
    restart: unless-stopped

networks:
  secure:
    driver: bridge
  dev:
    driver: bridge

volumes:
  proxy-certs:
